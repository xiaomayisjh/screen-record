<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="robots" content="noindex, nofollow">
    <title>Screen Recorder</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: {
                            850: '#172033',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-slate-900 text-slate-100">

    <!-- Main content area with bottom padding for nav -->
    <main class="pb-16 min-h-screen min-h-[100dvh]">

        <!-- ==================== RECORD PANEL ==================== -->
        <div id="panel-record" class="panel active items-center px-4 pt-8">
            <!-- Status badge -->
            <div id="status-badge" class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-800 text-sm text-slate-400 mb-6">
                <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-500"></span>
                <span id="status-text">Idle</span>
            </div>

            <!-- Timer -->
            <div id="timer" class="font-mono text-5xl md:text-6xl font-bold text-slate-100 mb-8 tabular-nums tracking-tight">
                00:00:00
            </div>

            <!-- Record button -->
            <button id="btn-record"
                class="w-20 h-20 md:w-24 md:h-24 rounded-full bg-red-500 hover:bg-red-600
                       active:scale-95 flex items-center justify-center shadow-lg shadow-red-500/25
                       transition-all duration-200 cursor-pointer focus:outline-none focus:ring-4
                       focus:ring-red-500/50 mb-8"
                aria-label="Start Recording">
                <svg id="icon-record" class="w-8 h-8 md:w-10 md:h-10 text-white" fill="currentColor" viewBox="0 0 24 24">
                    <circle cx="12" cy="12" r="8"/>
                </svg>
                <svg id="icon-stop" class="w-8 h-8 md:w-10 md:h-10 text-white hidden" fill="currentColor" viewBox="0 0 24 24">
                    <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
            </button>

            <!-- Filename -->
            <div class="w-full max-w-md mb-4">
                <label for="filename" class="block text-xs text-slate-400 mb-1.5 font-medium uppercase tracking-wider">Filename</label>
                <input id="filename" type="text"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm
                           text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/50
                           focus:border-blue-500 transition-colors duration-200"
                    placeholder="ScreenCapture_20260302.mp4">
            </div>

            <!-- Source selector -->
            <div class="w-full max-w-md mb-4">
                <label class="block text-xs text-slate-400 mb-1.5 font-medium uppercase tracking-wider">Source</label>
                <div class="flex gap-2">
                    <button id="src-desktop" data-source="desktop"
                        class="flex-1 py-2.5 px-3 rounded-lg text-sm font-medium transition-colors duration-200
                               cursor-pointer bg-blue-500/20 text-blue-400 border border-blue-500/30"
                        aria-pressed="true">
                        <svg class="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="2" y="3" width="20" height="14" rx="2"/>
                            <path d="M8 21h8M12 17v4"/>
                        </svg>
                        Desktop
                    </button>
                    <button id="src-window" data-source="title"
                        class="flex-1 py-2.5 px-3 rounded-lg text-sm font-medium transition-colors duration-200
                               cursor-pointer bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-750"
                        aria-pressed="false">
                        <svg class="w-4 h-4 inline-block mr-1 -mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M3 9h18"/>
                        </svg>
                        Window
                    </button>
                </div>
            </div>

            <!-- Window title (hidden by default) -->
            <div id="window-title-group" class="w-full max-w-md mb-4 hidden">
                <label for="window-title" class="block text-xs text-slate-400 mb-1.5 font-medium uppercase tracking-wider">Window Title</label>
                <input id="window-title" type="text"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm
                           text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/50
                           focus:border-blue-500 transition-colors duration-200"
                    placeholder="Enter window title...">
            </div>

            <!-- Webcam toggle -->
            <div class="w-full max-w-md mb-4">
                <div class="flex items-center justify-between bg-slate-800 rounded-lg px-4 py-3">
                    <div class="flex items-center gap-3">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                        </svg>
                        <span class="text-sm">Webcam</span>
                    </div>
                    <div id="toggle-webcam" class="toggle" role="switch" aria-checked="false" tabindex="0"></div>
                </div>
            </div>

            <!-- Webcam device (hidden by default) -->
            <div id="webcam-device-group" class="w-full max-w-md mb-4 hidden">
                <label class="block text-xs text-slate-400 mb-1.5 font-medium uppercase tracking-wider">Webcam Device</label>
                <select id="webcam-device"
                    class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2.5 text-sm
                           text-slate-100 focus:outline-none focus:ring-2 focus:ring-blue-500/50
                           cursor-pointer appearance-none">
                    <option value="">No devices found</option>
                </select>
            </div>

            <!-- Merging indicator -->
            <div id="merging-indicator" class="w-full max-w-md hidden">
                <div class="flex items-center gap-3 bg-slate-800 rounded-lg px-4 py-3">
                    <svg class="w-5 h-5 text-blue-400 animate-spin" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
                    </svg>
                    <span class="text-sm text-slate-300">Converting recording...</span>
                </div>
            </div>

            <!-- Error display -->
            <div id="error-display" class="w-full max-w-md hidden">
                <div class="flex items-start gap-3 bg-red-500/10 border border-red-500/20 rounded-lg px-4 py-3">
                    <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
                    </svg>
                    <span id="error-text" class="text-sm text-red-300"></span>
                </div>
            </div>
        </div>

        <!-- ==================== FILES PANEL ==================== -->
        <div id="panel-files" class="panel px-4 pt-6">
            <h2 class="text-lg font-semibold mb-4">Recordings</h2>
            <div id="files-list" class="space-y-2">
                <!-- Skeleton loading -->
                <div class="skeleton h-16 w-full"></div>
                <div class="skeleton h-16 w-full"></div>
                <div class="skeleton h-16 w-full"></div>
            </div>
            <div id="files-empty" class="hidden text-center py-16">
                <svg class="w-12 h-12 text-slate-600 mx-auto mb-3" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3.75 21h16.5A2.25 2.25 0 0022.5 18.75V5.25A2.25 2.25 0 0020.25 3H3.75A2.25 2.25 0 001.5 5.25v13.5A2.25 2.25 0 003.75 21z"/>
                </svg>
                <p class="text-slate-500 text-sm">No recordings yet</p>
            </div>
        </div>

        <!-- ==================== SETTINGS PANEL ==================== -->
        <div id="panel-settings" class="panel px-4 pt-6">
            <h2 class="text-lg font-semibold mb-6">Settings</h2>

            <!-- Video Settings -->
            <div class="mb-6">
                <h3 class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-3">Video</h3>
                <div class="space-y-4 bg-slate-800 rounded-xl p-4">
                    <!-- FPS -->
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-sm">Frame Rate</span>
                            <span id="fps-value" class="text-sm font-mono text-blue-400">30 fps</span>
                        </div>
                        <input id="fps-slider" type="range" min="1" max="120" value="30" step="1">
                    </div>

                    <!-- Encoder -->
                    <div>
                        <span class="text-sm block mb-2">Encoder</span>
                        <div class="flex gap-2">
                            <button id="enc-cpu" data-encoder="mpeg4"
                                class="flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-colors duration-200
                                       cursor-pointer bg-blue-500/20 text-blue-400 border border-blue-500/30">
                                CPU (mpeg4)
                            </button>
                            <button id="enc-nvenc" data-encoder="h264_nvenc"
                                class="flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-colors duration-200
                                       cursor-pointer bg-slate-700 text-slate-400 border border-slate-600 hover:bg-slate-650">
                                NVENC (GPU)
                            </button>
                        </div>
                    </div>

                    <!-- Draw mouse -->
                    <div class="flex items-center justify-between">
                        <span class="text-sm">Show Mouse Cursor</span>
                        <div id="toggle-mouse" class="toggle active" role="switch" aria-checked="true" tabindex="0"></div>
                    </div>
                </div>
            </div>

            <!-- Audio Settings -->
            <div class="mb-6">
                <h3 class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-3">Audio</h3>
                <div class="space-y-3 bg-slate-800 rounded-xl p-4">
                    <!-- Audio mode -->
                    <div class="flex gap-2 mb-3">
                        <button id="audio-default" data-audiomode="default"
                            class="flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-colors duration-200
                                   cursor-pointer bg-blue-500/20 text-blue-400 border border-blue-500/30">
                            Default Device
                        </button>
                        <button id="audio-select" data-audiomode="selected"
                            class="flex-1 py-2 px-3 rounded-lg text-xs font-medium transition-colors duration-200
                                   cursor-pointer bg-slate-700 text-slate-400 border border-slate-600 hover:bg-slate-650">
                            Select Devices
                        </button>
                    </div>

                    <!-- Device list (hidden by default) -->
                    <div id="audio-devices-group" class="hidden">
                        <div id="audio-devices-list" class="space-y-1 max-h-48 overflow-y-auto">
                            <p class="text-slate-500 text-sm py-2">Loading devices...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- About -->
            <div class="text-center text-xs text-slate-600 py-4">
                Screen Recorder WebUI &middot; GPL v3
            </div>
        </div>
    </main>

    <!-- ==================== BOTTOM NAVIGATION ==================== -->
    <nav class="bottom-nav fixed bottom-0 left-0 right-0 h-14 bg-slate-800/95 backdrop-blur-sm
                border-t border-slate-700/50 flex items-center z-50">
        <button class="nav-btn flex-1 h-full flex flex-col items-center justify-center cursor-pointer
                       min-h-[44px] transition-colors duration-200 text-blue-400"
                data-panel="record" aria-label="Record">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4" fill="currentColor"/>
            </svg>
            <span class="text-[10px] mt-0.5 font-medium">Record</span>
        </button>
        <button class="nav-btn flex-1 h-full flex flex-col items-center justify-center cursor-pointer
                       min-h-[44px] transition-colors duration-200 text-slate-500"
                data-panel="files" aria-label="Files">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
            </svg>
            <span class="text-[10px] mt-0.5 font-medium">Files</span>
        </button>
        <button class="nav-btn flex-1 h-full flex flex-col items-center justify-center cursor-pointer
                       min-h-[44px] transition-colors duration-200 text-slate-500"
                data-panel="settings" aria-label="Settings">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <span class="text-[10px] mt-0.5 font-medium">Settings</span>
        </button>
    </nav>

    <!-- Delete confirmation modal -->
    <div id="delete-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="bg-slate-800 rounded-2xl p-6 max-w-sm w-full shadow-2xl">
            <h3 class="text-lg font-semibold mb-2">Delete Recording?</h3>
            <p id="delete-modal-name" class="text-sm text-slate-400 mb-6 break-all"></p>
            <div class="flex gap-3">
                <button id="delete-cancel"
                    class="flex-1 py-2.5 rounded-lg bg-slate-700 text-slate-300 text-sm font-medium
                           cursor-pointer hover:bg-slate-600 transition-colors duration-200 min-h-[44px]">
                    Cancel
                </button>
                <button id="delete-confirm"
                    class="flex-1 py-2.5 rounded-lg bg-red-500 text-white text-sm font-medium
                           cursor-pointer hover:bg-red-600 transition-colors duration-200 min-h-[44px]">
                    Delete
                </button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
